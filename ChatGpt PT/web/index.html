<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyTrack v3 Builder</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 100px;
            font-family: monospace;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .error {
            color: #dc3545;
            margin-top: 10px;
            padding: 10px;
            background-color: #f8d7da;
            border-radius: 4px;
        }
        .output {
            margin-top: 20px;
        }
        #outputCode {
            font-family: monospace;
            font-size: 12px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <h1>PolyTrack v3 Builder</h1>
    
    <div class="form-group">
        <label for="trackName">Track Name:</label>
        <input type="text" id="trackName" placeholder="MyTrack" value="MyTrack">
    </div>
    
    <div class="form-group">
        <label for="description">Description (comma-separated):</label>
        <textarea id="description" placeholder="start, straight, right2, straight, left1, end"></textarea>
    </div>
    
    <button id="generateBtn">Generate</button>
    
    <div id="error" class="error" style="display: none;"></div>
    
    <div class="output" id="output" style="display: none;">
        <label for="outputCode">Generated v3 Code:</label>
        <textarea id="outputCode" readonly></textarea>
    </div>

    <script src="app.js"></script>
</body>
</html>
